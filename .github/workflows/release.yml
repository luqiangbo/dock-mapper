name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Build & release
        uses: tauri-apps/tauri-action@v2
        id: tauri_action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DockMapper ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --bundles msi,nsis
          releaseBody: |
            Please visit the [Microsoft Store](https://apps.microsoft.com/detail/DockMapper.DockMapper) to install DockMapper.

            Alternatively, download the installer below for manual installation.

            ## What's Changed
            See the full changelog at the [commits](https://github.com/luqiangbo/dev-taskbar-tools/commits/${{ github.ref_name }}).
