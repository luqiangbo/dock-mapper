name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Build installer (MSI + NSIS)
        uses: tauri-apps/tauri-action@v1
        id: tauri_action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DockMapper ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --bundles msi,nsis
          releaseBody: |
            ## Downloads

            - **MSIX** — 用于 Microsoft Store 提交
            - **MSI / NSIS** — 手动安装

            ## What's Changed
            完整的变更日志请查看 [commits](https://github.com/luqiangbo/dev-taskbar-tools/commits/${{ github.ref_name }}).

      - name: Install make-msix
        run: cargo install make-msix

      - name: Generate MSIX package
        run: |
          cd src-tauri
          make-msix --input target/release/DockMapper.exe
          echo "Generated MSIX files:"
          ls -la *.msix *.msixupload 2>/dev/null || echo "(no msixupload generated)"

      - name: Upload MSIX to release
        run: |
          gh release upload "${{ github.ref_name }}" src-tauri/*.msix src-tauri/*.msixupload --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (for Store submission)
        uses: actions/upload-artifact@v4
        with:
          name: DockMapper-${{ github.ref_name }}
          path: |
            src-tauri/*.msix
            src-tauri/*.msixupload
            src-tauri/target/release/*.msi
            src-tauri/target/release/*.exe
          compression-level: 0
